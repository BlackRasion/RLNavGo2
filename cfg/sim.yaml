# =============================================================================
# Isaac Sim Unitree Go2 仿真系统配置文件
# =============================================================================

# _self_ 表示使用当前配置文件的默认值
defaults:
  - _self_

# =============================================================================
# 仿真核心参数
# =============================================================================

# 机器人数量
num_envs: 1

# 控制频率（Hz）
freq: 40 # 必须能被 200 整除（物理仿真频率）

# 相机跟随模式
# True: 相机自动跟随机器人移动
# False: 相机固定在初始位置
camera_follow: True

# =============================================================================
# 仿真环境设置
# =============================================================================

# 环境类型选择
# env_name: warehouse # 简单仓库环境
# env_name: warehouse-shelves # 带货架的仓库环境
# env_name: warehouse-forklifts # 带叉车的仓库环境
# env_name: full-warehouse # 完整仓库环境（包含所有元素）
# env_name: obstacle-sparse # 稀疏障碍物场地
# env_name: obstacle-medium # 中等密度障碍物场地
env_name: obstacle-dense # 密集障碍物场地

# =============================================================================
# 传感器配置
# =============================================================================

sensor:
  # LiDAR 传感器（点云）
  enable_lidar: True
  
  # 相机传感器
  enable_camera: True
  
  # 是否启用彩色图像
  color_image: True
  
  # 是否启用深度图像
  depth_image: True
  
  # 是否启用语义分割图像
  semantic_segmentation: True

# =============================================================================
# 仿真应用配置
# =============================================================================

sim_app:
  # 抗锯齿级别
  # 0: 禁用抗锯齿（性能最佳）
  # 1-4: 抗锯齿级别（数值越高，图像质量越好，但性能开销越大）
  anti_aliasing: 0
  
  # 窗口宽度
  width: 1280
  
  # 窗口高度
  height: 720
  
  # 是否隐藏 UI
  # True: 隐藏 UI 界面，适合无头模式运行
  hide_ui: False
