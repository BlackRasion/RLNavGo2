# =============================================================================
# Safe Action 安全动作模块参数配置文件
# =============================================================================
# 该文件配置 ORCA (Optimal Reciprocal Collision Avoidance) 安全动作节点的参数
# ORCA 算法用于确保导航过程中的碰撞避免，是策略输出的安全保护层
# =============================================================================

safe_action_node:
  ros__parameters:
    # =========================================================================
    # ORCA 算法时间参数
    # =========================================================================
    # 预测时间窗口 (秒)
    # ORCA 算法预测未来多长时间内的碰撞风险
    # 较大的值可以提前规避远距离障碍物，但计算量增加
    # 较小的值反应更快，但可能无法及时规避快速障碍物
    # 建议值: 1.0 - 3.0 秒
    time_horizon: 2.0

    # 时间步长 (秒)
    # ORCA 算法内部模拟的时间分辨率
    # 较小的值提高精度，但增加计算量
    # 建议值: 0.02 - 0.1 秒
    time_step: 0.05

    # =========================================================================
    # 安全约束参数
    # =========================================================================
    # 最小飞行高度 (米)
    # 限制无人机的最低飞行高度，防止撞击地面
    # 应根据实际场景中的地面障碍物高度设置
    # 建议值: 0.5 - 1.0 米
    min_height: 0.7

    # 最大飞行高度 (米)
    # 限制无人机的最高飞行高度
    # 可根据任务需求和空域限制设置
    # 建议值: 1.0 - 3.0 米
    max_height: 1.3

    # 安全距离 (米)
    # 与障碍物保持的最小距离
    # 这是 ORCA 算法的核心参数，直接影响避障行为
    # 较大的值更安全但可能导致过度保守的行为
    # 较小的值更灵活但增加碰撞风险
    # 建议值: 0.2 - 0.5 米
    safety_distance: 0.3
