# =============================================================================
# YOLO Detector YOLO视觉检测器参数配置文件
# =============================================================================
# 该文件配置 onboard_detector 功能包中 YOLO 视觉检测节点的参数
# 用于从 RGB 图像中检测行人、车辆等动态障碍物
# =============================================================================

yolo_detector_node:
  ros__parameters:
    # =========================================================================
    # 传感器话题配置
    # =========================================================================
    # RGB 彩色图像话题名称
    # 用于 YOLO 视觉检测的输入图像
    # 消息类型: sensor_msgs/Image (BGR8 格式)
    color_image_topic: /unitree_go2/front_cam/color_image

    # =========================================================================
    # 时间参数
    # =========================================================================
    # 时间步长 (秒)
    # 连续两帧之间的时间间隔
    # 用于计算检测结果的时序一致性
    time_step: 0.033

    # =========================================================================
    # 调试与可视化
    # =========================================================================
    # 是否启用调试可视化
    # true:  在图像上绘制检测框并发布可视化话题
    # false: 仅输出检测结果，不发布可视化
    debug_vis: False
