# =============================================================================
# Navigation Runner 导航执行器参数配置文件
# =============================================================================
# 该文件配置导航节点 (navigation_node) 的运行参数
# 包括速度限制、话题名称、模型文件等
# =============================================================================

navigation_node:
  ros__parameters:
    # =========================================================================
    # 速度限制参数
    # =========================================================================
    # 最大线速度限制 (米/秒)
    # 控制无人机在 X/Y/Z 三个方向的最大飞行速度
    vel_limit: 1.0

    # =========================================================================
    # ROS2 话题配置
    # =========================================================================
    # 里程计话题名称
    # 接收机器人的位姿和速度信息，消息类型: nav_msgs/Odometry
    odom_topic: /unitree_go2/odom

    # 控制指令话题名称
    # 发布计算得到的速度指令，消息类型: geometry_msgs/Twist
    cmd_topic: /unitree_go2/cmd_vel

    # =========================================================================
    # 模型文件配置
    # =========================================================================
    # PPO 策略模型检查点文件
    # 文件路径: scripts/ckpts/<checkpoint_file>
    # 注意: 确保模型文件与训练时的配置 (drone.yaml, ppo.yaml) 匹配
    checkpoint_file: navrl_checkpoint.pt

    # =========================================================================
    # 可视化配置
    # =========================================================================
    # 是否可视化 LiDAR 射线
    # true:  在 RViz 中显示射线投射结果，便于调试
    # false: 关闭可视化，减少计算开销
    visualize_raycast: false
