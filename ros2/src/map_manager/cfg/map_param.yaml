# =============================================================================
# Map Manager 地图管理器参数配置文件
# =============================================================================
# 该文件配置占据地图和 ESDF 地图的各项参数，包括传感器参数、地图参数、射线投射参数等
# =============================================================================

map_manager_node:
  ros__parameters:
    # =========================================================================
    # 定位与传感器话题配置
    # =========================================================================
    # 定位模式选择
    # 0: 使用位姿话题 (pose) - 推荐，通常来自视觉定位或运动捕捉系统
    # 1: 使用里程计话题 (odom) - 来自飞控的里程计
    localization_mode: 0
    
    # 传感器话题名称
    depth_image_topic: /unitree_go2/front_cam/depth_image      # 深度图像话题
    point_cloud_topic: /unitree_go2/lidar/point_cloud          # LiDAR点云话题
    pose_topic: /unitree_go2/pose                              # 位姿话题 (geometry_msgs/PoseStamped)
    odom_topic: /unitree_go2/odom                              # 里程计话题 (nav_msgs/Odometry)

    # =========================================================================
    # 机器人尺寸配置
    # =========================================================================
    # 机器人尺寸用于地图膨胀，确保规划的安全距离
    # 格式: [长度(x), 宽度(y), 高度(z)]，单位: 米
    robot_size: [0.3, 0.3, 0.1]

    # =========================================================================
    # 深度相机参数配置
    # =========================================================================
    # 相机内参 [fx, fy, cx, cy]
    # fx, fy: 焦距 (像素)
    # cx, cy: 主点坐标 (像素)
    depth_intrinsics: [458.1245542807029, 458.1245542807029, 320.0, 240.0]
    
    # 深度值缩放因子
    # Intel RealSense 相机通常为 1000 (深度值单位为毫米)
    depth_scale_factor: 1000.0
    
    # 深度有效范围 (米)
    # 小于 min 或大于 max 的深度值将被过滤
    depth_min_value: 0.5
    depth_max_value: 5.0
    
    # 深度图像滤波参数
    depth_filter_margin: 2         # 图像边缘滤波宽度 (像素)，去除边缘噪声
    depth_skip_pixel: 2            # 降采样步长，每 N 个像素取 1 个，提高处理速度
    
    # 图像分辨率
    image_cols: 640                # 图像宽度 (像素)
    image_rows: 480                # 图像高度 (像素)
    
    # 相机外参: 机器人本体坐标系到深度相机坐标系的变换矩阵 (4x4)
    # 格式: [R11, R12, R13, tx, R21, R22, R23, ty, R31, R32, R33, tz, 0, 0, 0, 1]
    # 其中 R 为旋转矩阵，t 为平移向量
    body_to_depth_sensor: [0.0,  0.0,  1.0,  0.4,   # 相机安装在机器人前方 0.4m，朝上
                    -1.0,  0.0,  0.0,  0.0 ,         # 相机坐标系 X 轴朝左
                    0.0, -1.0,  0.0,  0.2,           # 相机坐标系 Z 轴朝前，高度 0.2m
                    0.0,  0.0,  0.0,  1.0]

    # =========================================================================
    # LiDAR 点云传感器参数配置
    # =========================================================================
    # 点云有效距离范围 (米)
    pointcloud_min_distance: 0.5
    pointcloud_max_distance: 5.0
    
    # LiDAR 外参: 机器人本体坐标系到 LiDAR 坐标系的变换矩阵 (4x4)
    body_to_pointcloud_sensor: [1.0,  0.0,  0.0,  0.2,   # LiDAR 安装在机器人前方 0.2m
                     0.0,  1.0,  0.0,  0.0 ,             # 朝向与机器人一致
                     0.0,  0.0,  1.0,  0.2,              # 高度 0.2m
                     0.0,  0.0,  0.0,  1.0]

    # =========================================================================
    # 射线投射 (Raycasting) 参数配置
    # =========================================================================
    # 最大射线长度 (米)
    # 超过此长度的射线将被截断
    raycast_max_length: 5.0
    
    # 概率占据模型参数
    # 这些参数用于贝叶斯更新占据概率
    p_hit: 0.70                    # 命中概率: 射线终点检测到障碍物的概率
    p_miss: 0.35                   # 未命中概率: 射线经过区域为空闲的概率
    p_min: 0.12                    # 最小占据概率 (截断值)，防止过度置信空闲
    p_max: 0.97                    # 最大占据概率 (截断值)，防止过度置信占据
    p_occ: 0.80                    # 占据判定阈值: 大于此值认为体素被占据

    # =========================================================================
    # 地图参数配置
    # =========================================================================
    # 地图分辨率 (米/体素)
    # 每个体素代表的实际空间大小，越小越精细但计算量越大
    map_resolution: 0.1
    
    # 地面高度 (米)
    # 低于此高度的点被视为地面点，在建图时可能被忽略
    ground_height: -0.1
    
    # 地图尺寸 (米)
    # 地图在 X, Y, Z 三个方向的预留大小
    # 实际地图范围: [-size/2, size/2]
    map_size: [60.0, 60.0, 3.0]
    
    # 局部更新范围 (米)
    # 只更新机器人周围该范围内的地图，提高实时性
    local_update_range: [5.0, 5.0, 5.0]
    
    # 局部边界膨胀 (米)
    # 在局部更新范围基础上再膨胀，确保地图连续性
    local_bound_inflation: 3.0
    
    # 是否清理局部地图
    # true: 定期清理局部地图外的数据，节省内存
    # false: 保留所有历史地图数据
    clean_local_map: false

    # =========================================================================
    # 可视化参数配置
    # =========================================================================
    # 局部地图可视化尺寸 (米)
    # 只可视化机器人周围该范围内的地图
    local_map_size: [5.0, 5.0, 3.0]
    
    # 最大可视化高度 (米)
    # 高于此高度的地图数据不显示
    max_height_visualization: 4.0
    
    # 是否可视化全局地图
    # true: 显示整个地图 (可能很耗性能)
    # false: 只显示局部地图
    visualize_global_map: true
    
    # 是否输出详细日志
    verbose: false

    # =========================================================================
    # 预建地图配置
    # =========================================================================
    # 预建地图文件路径 (PCD 格式点云文件)
    # "No": 不加载预建地图，从零开始建图
    # 其他路径: 加载指定的 PCD 文件作为静态环境
    prebuilt_map_directory: "No"
    # prebuilt_map_directory: "path/to/static_map.pcd"